<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Show Modal — NoJS</title>
  <style>
    @media (prefers-color-scheme: dark) {
      html { background: #0f0f13; color: #e8e8f0; color-scheme: dark; }
    }
  </style>
</head>
<body>

  <button command="show-modal" commandfor="my-dialog">Open dialog</button>

  <dialog id="my-dialog">
    <p>This dialog was opened with zero JavaScript.</p>
    <button command="close" commandfor="my-dialog">Close</button>
  </dialog>

</body>
</html>
