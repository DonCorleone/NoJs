<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Named Grid Lines — NoJS</title>
  <meta name="pattern:name" content="grid-layout-named-lines">
  <meta name="pattern:shows" content="A sidebar/header/content/footer layout where grid items are placed using named grid lines instead of numeric indexes.">
  <meta name="pattern:techniques" content="named grid lines in grid-template-columns, grid-column/row placement by name">
  <meta name="pattern:css-features" content="css-grid">
  <style>
    @media (prefers-color-scheme: dark) {
      html { background: #0f0f13; color: #e8e8f0; color-scheme: dark; }
    }

    .keys {
      margin: 24px 24px 16px;
      padding: 0;
      list-style: none;
      font-family: monospace;
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .keys li::before { content: "→ "; opacity: 0.4; }

    .grid {
      display: grid;
      grid-template-columns: 160px [main-start] 1fr [main-end];
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      height: 200px;
      margin: 0 24px;
    }

    .sidebar  { grid-column: 1; grid-row: 1 / 4; background: lightblue; color: #1a1a1a; }
    .header   { grid-column: main-start / main-end; grid-row: 1; background: lightgreen; color: #1a1a1a; }
    .content  { grid-column: main-start / main-end; grid-row: 2; background: lightyellow; color: #1a1a1a; }
    .footer   { grid-column: main-start / main-end; grid-row: 3; background: lightcoral; color: #1a1a1a; }
  </style>
</head>
<body>

  <ul class="keys">
    <li><code>[main-start]</code> / <code>[main-end]</code> — name any grid line inside brackets</li>
    <li><code>grid-column: main-start / main-end</code> — place items by name, not by number</li>
    <li>adding or removing tracks won't break placement — names travel with the lines</li>
  </ul>

  <div class="grid">
    <div class="sidebar">sidebar</div>
    <div class="header">header</div>
    <div class="content">content — grid-column: main-start / main-end</div>
    <div class="footer">footer</div>
  </div>

</body>
</html>
