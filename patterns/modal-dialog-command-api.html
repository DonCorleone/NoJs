<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Show Modal — NoJS</title>
  <meta name="pattern:name" content="modal-dialog-command-api">
  <meta name="pattern:shows" content="A native dialog opened and closed with the new declarative command/commandfor button attributes.">
  <meta name="pattern:techniques" content="command=show-modal, commandfor, command=close">
  <meta name="pattern:css-features" content="dialog">
  <link rel="stylesheet" href="../theme.css">
</head>
<body>

  <ul class="keys">
    <li><code>command="show-modal"</code> — opens the target dialog without JS</li>
    <li><code>commandfor</code> — links the button to the dialog by id</li>
    <li><code>command="close"</code> — closes it the same way, from inside the dialog</li>
  </ul>

  <button command="show-modal" commandfor="my-dialog">Open dialog</button>

  <dialog id="my-dialog">
    <p>This dialog was opened with zero JavaScript.</p>
    <button command="close" commandfor="my-dialog">Close</button>
  </dialog>

</body>
</html>
